[www]
user  = www-data
group = www-data

; Listen on TCP so NGINX (in a separate container) can reach PHP-FPM
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

; Process manager
pm                   = dynamic
pm.max_children      = 5
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Logs go to Docker stdout/stderr
php_admin_value[error_log]  = /proc/self/fd/2
php_admin_flag[log_errors]  = on
