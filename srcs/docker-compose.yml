services:

  # ─── NGINX ──────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    restart: always
    env_file:
      - .env

  # ─── WordPress + PHP-FPM ────────────────────────────────────────────────────
  wordpress:
    build:
      context: requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    restart: always
    env_file:
      - .env

  # ─── MariaDB ────────────────────────────────────────────────────────────────
  mariadb:
    build:
      context: requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    restart: always
    env_file:
      - .env

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  inception:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
# Named volumes with local driver pointing to /home/miltavar42/data/*
# The directories must exist before `docker-compose up` (Makefile handles it).
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/miltavar42/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/miltavar42/data/wordpress
